spring.application.name=TaskFlow

# PostgreSQL (override via env vars in real deployments)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# Flyway owns the schema: Hibernate only validates that entities match the DB
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
# The fallback below is for LOCAL DEV ONLY; in any shared/deployed environment set JWT_SECRET.
jwt.secret=${JWT_SECRET:aHgCTzF+TGIc0odm62aefDUNWx0ymGFjbD7zKwmLxus=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
# Refresh tokens: 14 days, single-use (rotated on every refresh)
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:1209600000}

# First-admin bootstrap (disabled unless both are set)
admin.email=${ADMIN_EMAIL:}
admin.password=${ADMIN_PASSWORD:}

# Pagination
spring.data.web.pageable.max-page-size=100

# Server
server.port=8080

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE